name: Deploy Cloudflare Containers

on:
  workflow_dispatch:
    inputs:
      model_release_tag:
        description: "GitHub Release tag that contains the BERT model ZIP"
        required: true
        default: "bert-model"
      model_asset_name:
        description: "Release asset ZIP name"
        required: true
        default: "xhs-bert-sentiment.zip"

concurrency:
  group: deploy-cloudflare-containers
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: production
      url: https://opinion.liuhe.me
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      MODEL_RELEASE_TAG: ${{ inputs.model_release_tag }}
      MODEL_ASSET_NAME: ${{ inputs.model_asset_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download BERT model release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .deploy/model-release .deploy/model-unzip bert/models/xhs-bert-sentiment
          gh release download "$MODEL_RELEASE_TAG" \
            --pattern "$MODEL_ASSET_NAME" \
            --dir .deploy/model-release
          python - <<'PY'
          import pathlib
          import zipfile

          zip_path = pathlib.Path(".deploy/model-release") / pathlib.Path(__import__("os").environ["MODEL_ASSET_NAME"])
          target = pathlib.Path(".deploy/model-unzip")
          target.mkdir(parents=True, exist_ok=True)

          with zipfile.ZipFile(zip_path) as archive:
              for item in archive.infolist():
                  normalized = item.filename.replace("\\", "/").strip("/")
                  if not normalized:
                      continue
                  destination = target / normalized
                  if not destination.resolve().is_relative_to(target.resolve()):
                      raise SystemExit(f"Refusing to extract path outside target: {item.filename}")
                  if item.is_dir() or item.filename.endswith(("/", "\\")):
                      destination.mkdir(parents=True, exist_ok=True)
                      continue
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  with archive.open(item) as source, destination.open("wb") as output:
                      output.write(source.read())
          PY

          if [ -f ".deploy/model-unzip/config.json" ]; then
            model_source=".deploy/model-unzip"
          else
            model_source="$(dirname "$(find .deploy/model-unzip -name config.json -print -quit)")"
          fi

          if [ -z "$model_source" ] || [ ! -f "$model_source/config.json" ]; then
            echo "Could not find config.json inside model ZIP."
            exit 1
          fi

          cp -R "$model_source"/. bert/models/xhs-bert-sentiment/
          test -f bert/models/xhs-bert-sentiment/config.json
          test -f bert/models/xhs-bert-sentiment/tokenizer.json
          test -f bert/models/xhs-bert-sentiment/tokenizer_config.json
          if [ ! -f bert/models/xhs-bert-sentiment/model.safetensors ] && [ ! -f bert/models/xhs-bert-sentiment/pytorch_model.bin ]; then
            echo "Model ZIP must include model.safetensors or pytorch_model.bin."
            exit 1
          fi

      - name: Show model package summary
        run: |
          set -euo pipefail
          du -sh bert/models/xhs-bert-sentiment
          find bert/models/xhs-bert-sentiment -maxdepth 1 -type f -printf "%f %s bytes\n" | sort

      - name: Type check
        run: npm run check

      - name: Worker tests
        run: npm run test:worker

      - name: Build
        run: npm run build

      - name: Deploy Worker and BERT container
        run: npx wrangler deploy --containers-rollout=immediate

      - name: Verify Worker health
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --retry 6 --retry-delay 10 https://opinion.liuhe.me/api/health

      - name: Verify BERT container health
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --retry 10 --retry-delay 15 https://opinion.liuhe.me/api/bert/health

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Cloudflare Containers deployment"
            echo ""
            echo "- Worker: https://opinion.liuhe.me"
            echo "- Health: https://opinion.liuhe.me/api/health"
            echo "- BERT health: https://opinion.liuhe.me/api/bert/health"
            echo "- Model release tag: $MODEL_RELEASE_TAG"
            echo "- Model asset: $MODEL_ASSET_NAME"
          } >> "$GITHUB_STEP_SUMMARY"
