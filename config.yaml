browser:
  home_url: "https://www.xiaohongshu.com/explore"
  login_url: "https://www.xiaohongshu.com/"
  login_candidates:
    - "https://www.xiaohongshu.com/"
    - "https://www.xiaohongshu.com/explore"
    - "https://www.xiaohongshu.com/search_result"
  headless: false
  slow_mo_ms: 200
  default_timeout_ms: 20000
  storage_state_path: "sessions/xiaohongshu_storage_state.json"
  ignore_https_errors: true
  locale: "zh-CN"
  timezone_id: "Asia/Shanghai"
  user_agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
  launch_args:
    - "--disable-blink-features=AutomationControlled"
    - "--disable-quic"
    - "--disable-dev-shm-usage"

crawl:
  posts_per_batch: 10
  comments_per_post: 40
  max_scroll_rounds: 20
  feed_scroll_px: 1600
  post_open_wait_ms: 2000
  comment_expand_clicks: 6
  comment_scroll_rounds: 8
  comment_scroll_px: 900
  dedupe_fallback_salt: "public-opinion-v1"
