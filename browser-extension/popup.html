<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opinion Capture</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Xiaohongshu Opinion Capture</p>
        <h1>本机浏览器采集，小红书已登录即可用</h1>
      </header>

      <label>
        Worker 地址
        <input id="workerUrl" type="url" />
      </label>
      <label>
        关键词
        <input id="keyword" placeholder="例如：咖啡" maxlength="60" />
      </label>
      <div class="grid">
        <label>
          帖子数
          <input id="maxPosts" type="number" min="1" max="30" value="10" />
        </label>
        <label>
          每帖评论
          <input id="commentsPerPost" type="number" min="0" max="80" value="30" />
        </label>
      </div>
      <label>
        标注引擎
        <select id="engine">
          <option value="llm">LLM</option>
          <option value="bert">BERT</option>
        </select>
      </label>

      <div class="actions">
        <button id="captureBtn">采集当前页</button>
        <button id="analyzeBtn" class="primary" disabled>发送分析</button>
      </div>

      <section id="status" class="status">打开小红书搜索页或帖子详情页后点击采集。</section>
      <section id="result" class="result" hidden></section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
